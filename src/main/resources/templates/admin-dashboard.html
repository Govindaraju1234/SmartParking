<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>
<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand">
            Smart Parking - Admin Panel
        </a>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>

</nav>

<div class="container mt-5">

    <h2>
        Welcome Admin,
        <span th:text="${session.loggedInUser.fullName}"></span>
    </h2>

    <!-- Existing Dashboard Cards -->

    <div class="row mt-4">

        <div class="col-md-4 mb-3">
            <div class="card bg-primary text-white">
                <div class="card-body text-center">
                    <h5>Total Users</h5>
                    <h2 th:text="${totalUsers}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card bg-success text-white">
                <div class="card-body text-center">
                    <h5>Total Parking Slots</h5>
                    <h2 th:text="${totalSlots}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card bg-warning text-dark">
                <div class="card-body text-center">
                    <h5>Total Bookings</h5>
                    <h2 th:text="${totalBookings}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="card bg-info text-white">
                <div class="card-body text-center">
                    <h5>Total Payments</h5>
                    <h2 th:text="${totalPayments}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-3">
            <div class="card bg-secondary text-white">
                <div class="card-body text-center">
                    <h5>Total Parking History</h5>
                    <h2 th:text="${totalHistory}"></h2>
                </div>
            </div>
        </div>

    </div>

    <!-- New Dashboard Cards -->

    <div class="row mt-3">

        <div class="col-md-4 mb-3">
            <div class="card bg-success text-white">
                <div class="card-body text-center">
                    <h5>Available Slots</h5>
                    <h2 th:text="${availableSlots}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card bg-danger text-white">
                <div class="card-body text-center">
                    <h5>Booked Slots</h5>
                    <h2 th:text="${bookedSlots}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card bg-dark text-white">
                <div class="card-body text-center">
                    <h5>Total Revenue</h5>
                    <h2>₹ <span th:text="${totalRevenue}"></span></h2>
                </div>
            </div>
        </div>

    </div>

    <hr>

    <div class="row">

        <div class="col-md-4 mb-3">
            <a href="/admin/users" class="btn btn-primary w-100">
                Manage Users
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/admin/slots" class="btn btn-success w-100">
                Manage Parking Slots
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/admin/bookings" class="btn btn-warning w-100">
                View Bookings
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/admin/payments" class="btn btn-info w-100">
                View Payments
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/admin/history" class="btn btn-secondary w-100">
                Parking History
            </a>
        </div>

        <div class="col-md-4 mb-3">
            <a href="/admin/verify-qr" class="btn btn-dark w-100">
                Verify QR Code
            </a>
        </div>

    </div>

</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
