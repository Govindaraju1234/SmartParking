<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Bookings</title>

    <link rel="stylesheet" href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h2 class="mb-4">My Bookings</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Parking Slot</th>
            <th>Vehicle Number</th>
            <th>Status</th>
            <th>Action</th>
            <th>QR Code</th>
            <th>QR Details</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="booking : ${bookings}">

            <td th:text="${booking.id}"></td>

            <td th:text="${booking.parkingSlot.slotNumber}"></td>

            <td th:text="${booking.vehicleNumber}"></td>

            <td th:text="${booking.status}"></td>

            <!-- Action -->
            <td>

                <a th:if="${booking.status == 'BOOKED'}"
                   th:href="@{'/user/payment/' + ${booking.id}}"
                   class="btn btn-success btn-sm mb-1">
                    Pay Now
                </a>

                <a th:if="${booking.status == 'BOOKED'}"
                   th:href="@{'/user/bookings/cancel/' + ${booking.id}}"
                   class="btn btn-danger btn-sm mb-1"
                   onclick="return confirm('Cancel this booking?')">
                    Cancel
                </a>

                <span th:if="${booking.status == 'PAID'}"
                      class="badge bg-success">
                    Payment Completed
                </span>

                <span th:if="${booking.status == 'CANCELLED'}"
                      class="badge bg-danger">
                    Cancelled
                </span>

            </td>

            <!-- QR Code -->
            <td>

                <img th:if="${booking.qrCodePath != null}"
                     th:src="${booking.qrCodePath}"
                     width="120"
                     height="120">

                <span th:if="${booking.qrCodePath == null}">
                    No QR
                </span>

            </td>

            <!-- QR Details -->
            <td>

                <a th:if="${booking.qrCodePath != null}"
                   th:href="@{'/user/booking/' + ${booking.id} + '/qr'}"
                   class="btn btn-primary btn-sm">
                    View QR
                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <a href="/dashboard" class="btn btn-secondary">
        Back
    </a>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>

</html>
