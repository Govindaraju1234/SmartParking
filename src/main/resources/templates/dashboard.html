<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>User Dashboard</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="text-center mb-5">

        <h1>Welcome to Smart Parking</h1>

        <p class="text-muted">
            Book and manage your parking easily.
        </p>

    </div>

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card text-center p-4 shadow">

                <i class="fa-solid fa-square-parking fa-3x text-primary"></i>

                <h4 class="mt-3">Book Slot</h4>

                <a href="/user/book-slot"
                   class="btn btn-primary mt-3">

                    Open

                </a>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center p-4 shadow">

                <i class="fa-solid fa-calendar-check fa-3x text-success"></i>

                <h4 class="mt-3">My Bookings</h4>

                <a href="/user/bookings"
                   class="btn btn-success mt-3">

                    View

                </a>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center p-4 shadow">

                <i class="fa-solid fa-credit-card fa-3x text-warning"></i>

                <h4 class="mt-3">Payments</h4>

                <a href="/user/payments"
                   class="btn btn-warning mt-3">

                    Open

                </a>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center p-4 shadow">

                <i class="fa-solid fa-clock-rotate-left fa-3x text-danger"></i>

                <h4 class="mt-3">History</h4>

                <a href="/user/history"
                   class="btn btn-danger mt-3">

                    View

                </a>

            </div>

        </div>

    </div>

</div>
<div th:replace="fragments/footer :: footer"></div>
</body>

</html>
