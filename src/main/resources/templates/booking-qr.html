<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Booking QR Code</title>
<link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5 text-center">

    <h2>Parking Entry QR Code</h2>

    <hr>

    <h4>Booking ID :
        <span th:text="${booking.id}"></span>
    </h4>

    <h4>Parking Slot :
        <span th:text="${booking.parkingSlot.slotNumber}"></span>
    </h4>

    <h4>Vehicle :
        <span th:text="${booking.vehicleNumber}"></span>
    </h4>

    <br>

    <img th:src="${booking.qrCodePath}"
         width="300"
         height="300">

    <br><br>

    <button onclick="window.print()"
            class="btn btn-success">

        Print QR Code

    </button>

    <a href="/user/bookings"
       class="btn btn-secondary">

        Back

    </a>

</div>
<div th:replace="fragments/footer :: footer"></div>
</body>

</html>
