<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Booking Management</title>
    <link rel="stylesheet" href="/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2 class="mb-4">All Bookings</h2>
    <form action="/admin/bookings/search" method="get" class="mb-3">

    <div class="input-group">

        <input type="text"
               name="vehicleNumber"
               class="form-control"
               placeholder="Search by Vehicle Number">

        <button class="btn btn-primary">
            Search
        </button>

    </div>

</form>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>User</th>
            <th>Parking Slot</th>
            <th>Vehicle Number</th>
            <th>Booking Date</th>
            <th>Start Time</th>
            <th>End Time</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="booking : ${bookings}">

            <td th:text="${booking.id}"></td>

            <td th:text="${booking.user.fullName}"></td>

            <td th:text="${booking.parkingSlot.slotNumber}"></td>

            <td th:text="${booking.vehicleNumber}"></td>

            <td th:text="${booking.bookingDate}"></td>

            <td th:text="${booking.startTime}"></td>

            <td th:text="${booking.endTime}"></td>

            <td th:text="${booking.status}"></td>

        </tr>

        </tbody>

    </table>

    <a href="/admin/dashboard" class="btn btn-secondary">
        Back
    </a>

</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
