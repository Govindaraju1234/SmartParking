<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>My Parking History</title>
<link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2>My Parking History</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Booking ID</th>
            <th>Entry Time</th>
            <th>Exit Time</th>
            <th>Total Hours</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="history : ${historyList}">

            <td th:text="${history.id}"></td>

            <td th:text="${history.booking.id}"></td>

            <td th:text="${history.entryTime}"></td>

            <td th:text="${history.exitTime}"></td>

            <td th:text="${history.totalHours}"></td>

        </tr>

        </tbody>

    </table>

    <a href="/dashboard"
       class="btn btn-secondary">
        Back
    </a>

</div>
<div th:replace="fragments/footer :: footer"></div>
</body>

</html>
