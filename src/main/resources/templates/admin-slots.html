<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Manage Parking Slots</title>
     <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2 class="mb-4">Manage Parking Slots</h2>

    <!-- Add Slot Form -->
    <form action="/admin/slots/add" method="post" class="row g-3 mb-4">

        <!-- Slot Number -->
        <div class="col-md-3">
            <input type="text"
                   name="slotNumber"
                   class="form-control"
                   placeholder="Slot Number"
                   required>
        </div>

        <!-- Vehicle Type -->
        <div class="col-md-3">
            <select name="vehicleType" class="form-select" required>
                <option value="">Select Vehicle Type</option>
                <option value="CAR">CAR</option>
                <option value="BIKE">BIKE</option>
            </select>
        </div>

        <!-- Status -->
        <div class="col-md-3">
            <select name="status" class="form-select">
                <option value="AVAILABLE">AVAILABLE</option>
                <option value="BOOKED">BOOKED</option>
            </select>
        </div>

        <!-- Add Button -->
        <div class="col-md-3">
            <button type="submit" class="btn btn-success w-100">
                Add Slot
            </button>
        </div>

    </form>

    <!-- Slot Table -->
    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Slot Number</th>
            <th>Vehicle Type</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="slot : ${slots}">

            <td th:text="${slot.id}"></td>

            <td th:text="${slot.slotNumber}"></td>

            <td th:text="${slot.vehicleType}"></td>

            <td th:text="${slot.status}"></td>

            <td>

                <a th:href="@{'/admin/slots/edit/' + ${slot.id}}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{'/admin/slots/delete/' + ${slot.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this slot?')">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <a href="/admin/dashboard" class="btn btn-secondary">
        Back to Dashboard
    </a>

</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
