<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Parking Slot</title>
<link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2>Edit Parking Slot</h2>

    <form action="/admin/slots/update" method="post">

        <input type="hidden"
               name="id"
               th:value="${slot.id}">

        <div class="mb-3">

            <label>Slot Number</label>

            <input type="text"
                   name="slotNumber"
                   th:value="${slot.slotNumber}"
                   class="form-control">

        </div>

        <div class="mb-3">

            <label>Status</label>

            <select name="status"
                    class="form-select">

                <option value="AVAILABLE"
                        th:selected="${slot.status=='AVAILABLE'}">
                    AVAILABLE
                </option>

                <option value="BOOKED"
                        th:selected="${slot.status=='BOOKED'}">
                    BOOKED
                </option>

            </select>

        </div>

        <button class="btn btn-primary">
            Update Slot
        </button>

        <a href="/admin/slots"
           class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>
<div th:replace="fragments/footer :: footer"></div>
</body>

</html>
